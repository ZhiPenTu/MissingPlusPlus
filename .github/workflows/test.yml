name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一个 PR 不并发跑, 节省 macOS runner quota
concurrency:
  group: missingpp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build (Debug) + Run Tests
    runs-on: macos-15  # macOS 15 + Xcode 16, 工程 deployment target 26.0 需要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app
        # macos-15 runner 默认 Xcode 16.0+, 跟工程 deployment target 26.0 兼容
        # (Xcode 15.4 最高 SDK 14.5, 不支持 macOS 26 target)

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: build/DerivedData
          key: deriveddata-${{ runner.os }}-${{ hashFiles('MissingPlusPlus.xcodeproj/project.pbxproj') }}
          # pbxproj 改了 (新增文件 / 改 build setting) 缓存失效
          # 缓存命中能省 1-2 分钟
          restore-keys: |
            deriveddata-${{ runner.os }}-

      - name: Build (Debug)
        run: |
          set -euo pipefail
          # CI runner 是 macOS 15.7.7, 跑不了 deployment target 26.0 的 test
          # (Xcode 拒绝: 'My Mac doesn't match macOS 26.0 deployment target')
          # Test 临时降到 15.0 让 CI 能跑, release build 仍然走 26.0
          xcodebuild \
            -project MissingPlusPlus.xcodeproj \
            -scheme MissingPlusPlus \
            -configuration Debug \
            -derivedDataPath build/DerivedData \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MACOSX_DEPLOYMENT_TARGET=15.0 \
            build-for-testing

      - name: Run Tests
        env:
          # run_tests.sh 内部用 xcodebuild test, 也需要降 target
          MACOSX_DEPLOYMENT_TARGET: "15.0"
        run: ./scripts/run_tests.sh
        # run_tests.sh 输出末尾 30 行 (build result + test summary),
        # 失败时 tail 末尾 60 行重新打
        # workflow 日志直接可读, 不需要下载 xcresult artifact

      - name: On failure, upload xcresult
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/DerivedData/Logs/Test/*.xcresult
          # 失败时把 xcresult 上传, 本地能用 xcodebuild -resultBundlePath 看 detail
          if-no-files-found: ignore
